# ============================================================
# selflearn-backend 编排：6 基础设施 + gateway + worker
# 用法：
#   cp .env.example .env
#   docker compose up -d                # 全部起
#   docker compose up -d postgres ...   # 仅起基础设施
# ============================================================

services:

  # ---------- 基础设施 ----------

  postgres:
    image: postgres:16-alpine
    container_name: selflearn-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: selflearn-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: selflearn-qdrant
    ports:
      - "6333:6333"  # HTTP
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # qdrant 镜像无 wget/curl，且 /bin/sh 不支持 /dev/tcp；显式调 bash
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && printf \"GET /healthz HTTP/1.0\\r\\n\\r\\n\" >&3 && grep -q \"healthz check passed\" <&3'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: selflearn-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: selflearn-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: selflearn
      RABBITMQ_DEFAULT_PASS: selflearn_dev
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: selflearn-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC ingest
      - "4318:4318"    # OTLP HTTP ingest
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ | grep -q 'Jaeger UI'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------- 应用 ----------

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: selflearn-gateway
    command: ["uv", "run", "python", "-m", "selflearn.main", "--role=gateway"]
    env_file: .env
    environment:
      # 覆盖 .env 中的 host，使外部可访问
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: selflearn-worker
    command: ["uv", "run", "python", "-m", "selflearn.main", "--role=worker"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  rabbitmq_data: