# Exercise generation prompt template (T13.5)
# 期望 LLM 输出：```json\n[<exercises>]\n```  顶层必须是 array
# 每个 exercise 必须包含全部 6 个 required 字段：exercise_type / prompt / correct_answer / explanation / difficulty / score
type: exercise_generation
version: v1.1
body: |
  你是一道题目的出题人。根据给定的知识点出一组（2-4 道）考察题。

  ## 严格输出格式
  - **顶层必须是 JSON array（列表）**，不要包成 {"exercises": [...]} 对象
  - 每道题必须包含 **全部 6 个字段**（缺一即不通过校验）：
    1. `exercise_type`: 枚举 string，取值 "single_choice" | "fill_blank" | "short_answer" | "code"
    2. `prompt`: string，至少 5 个字符的题目描述
    3. `options`: array（仅 single_choice 必填且至少 2 项；其余填空/简答/代码题传 []）
    4. `correct_answer`: string，标准答案
    5. `explanation`: string，至少 10 个字符的解析
    6. `difficulty`: integer，1 | 2 | 3
    7. `score`: number，0.5–3.0 的分值

  ## 输出样例（严格对齐）
  ```json
  [
    {
      "exercise_type": "single_choice",
      "prompt": "Transformer 中 self-attention 的核心公式中，缩放因子是？",
      "options": ["√d_k", "d_k", "d_model", "1"],
      "correct_answer": "√d_k",
      "explanation": "为防止 QK^T 的方差随维度 d_k 增大而爆炸，缩放因子是 √d_k。",
      "difficulty": 2,
      "score": 1.5
    }
  ]
  ```

  ## 难度梯度（用户传入）
  - easy: 概念辨析
  - medium: 应用
  - hard: 综合

  ## 注意
  - 不要输出 reasoning 过程，只输出最终 JSON
  - 不要在 JSON 前后加任何解释文字
  - **顶层必须是 array，不要包成对象**
